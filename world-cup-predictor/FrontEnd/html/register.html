<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - World Cup Predictor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <!-- Contenedor Principal -->
  <div class="container-main">
    <div class="card-container">
      <div class="text-center mb-4">
        <h1>⚽ World Cup Predictor</h1>
        <p class="text-muted">Únete y comienza a predecir</p>
      </div>

      <!-- Alert para mensajes -->
      <div id="alertContainer"></div>

      <!-- Formulario de Registro -->
      <form id="registerForm">
        <div class="form-group">
          <label for="name" class="form-label">Nombre Completo</label>
          <input
            type="text"
            class="form-control"
            id="name"
            name="name"
            placeholder="Ingresa tu nombre completo"
            required
            minlength="3"
          >
          <div class="error-message" id="nameError"></div>
        </div>

        <div class="form-group">
          <label for="username" class="form-label">Usuario</label>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            placeholder="Elige un nombre de usuario único"
            required
            minlength="3"
            pattern="^[a-zA-Z0-9_-]+$"
          >
          <small class="form-text">Solo letras, números, guiones y guiones bajos</small>
          <div class="error-message" id="usernameError"></div>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Contraseña</label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="Contraseña (mínimo 6 caracteres)"
            required
            minlength="6"
          >
          <small class="form-text">Usa mayúsculas, minúsculas y números para mayor seguridad</small>
          <div class="error-message" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
          <input
            type="password"
            class="form-control"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Confirma tu contraseña"
            required
            minlength="6"
          >
          <div class="error-message" id="confirmPasswordError"></div>
        </div>

        <div class="form-group form-check">
          <input
            type="checkbox"
            class="form-check-input"
            id="terms"
            name="terms"
            required
          >
          <label class="form-check-label" for="terms">
            Acepto los <a href="#">términos y condiciones</a>
          </label>
          <div class="error-message" id="termsError"></div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          <span id="btnText">Crear Cuenta</span>
          <span id="btnSpinner" class="spinner" style="display: none; margin-left: 0.5rem;"></span>
        </button>
      </form>

      <!-- Link a Login -->
      <div class="link-auth">
        <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script>
    /**
     * Gestión del formulario de Registro
     */

    const registerForm = document.getElementById('registerForm');
    const alertContainer = document.getElementById('alertContainer');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');

    /**
     * Mostrar alerta
     * @param {string} message - Mensaje a mostrar
     * @param {string} type - Tipo de alerta (success, danger, info, warning)
     */
    function showAlert(message, type = 'danger') {
      const alert = document.createElement('div');
      alert.className = `alert alert-${type} alert-dismissible fade show`;
      alert.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      `;

      alertContainer.innerHTML = '';
      alertContainer.appendChild(alert);

      // Auto-cerrar después de 5 segundos
      setTimeout(() => {
        if (alert.parentElement) {
          alert.remove();
        }
      }, 5000);
    }

    /**
     * Validar formulario
     * @returns {boolean}
     */
    function validateForm() {
      const name = document.getElementById('name');
      const username = document.getElementById('username');
      const password = document.getElementById('password');
      const confirmPassword = document.getElementById('confirmPassword');
      const terms = document.getElementById('terms');

      let isValid = true;

      // Validar nombre
      if (!name.value || name.value.length < 3) {
        showErrorMessage('nameError', 'Nombre debe tener al menos 3 caracteres');
        isValid = false;
      } else {
        clearErrorMessage('nameError');
      }

      // Validar usuario
      const usernamePattern = /^[a-zA-Z0-9_-]+$/;
      if (!username.value || username.value.length < 3) {
        showErrorMessage('usernameError', 'Usuario debe tener al menos 3 caracteres');
        isValid = false;
      } else if (!usernamePattern.test(username.value)) {
        showErrorMessage('usernameError', 'Usuario solo puede contener letras, números, guiones y guiones bajos');
        isValid = false;
      } else {
        clearErrorMessage('usernameError');
      }

      // Validar contraseña
      if (!password.value || password.value.length < 6) {
        showErrorMessage('passwordError', 'Contraseña debe tener al menos 6 caracteres');
        isValid = false;
      } else {
        clearErrorMessage('passwordError');
      }

      // Validar confirmación de contraseña
      if (password.value !== confirmPassword.value) {
        showErrorMessage('confirmPasswordError', 'Las contraseñas no coinciden');
        isValid = false;
      } else if (!confirmPassword.value) {
        showErrorMessage('confirmPasswordError', 'Debe confirmar la contraseña');
        isValid = false;
      } else {
        clearErrorMessage('confirmPasswordError');
      }

      // Validar términos
      if (!terms.checked) {
        showErrorMessage('termsError', 'Debes aceptar los términos y condiciones');
        isValid = false;
      } else {
        clearErrorMessage('termsError');
      }

      return isValid;
    }

    /**
     * Mostrar mensaje de error
     * @param {string} elementId - ID del elemento de error
     * @param {string} message - Mensaje de error
     */
    function showErrorMessage(elementId, message) {
      const errorElement = document.getElementById(elementId);
      if (errorElement) {
        errorElement.textContent = message;
        errorElement.classList.add('show');
      }
    }

    /**
     * Limpiar mensaje de error
     * @param {string} elementId - ID del elemento de error
     */
    function clearErrorMessage(elementId) {
      const errorElement = document.getElementById(elementId);
      if (errorElement) {
        errorElement.textContent = '';
        errorElement.classList.remove('show');
      }
    }

    /**
     * Limpiar todos los mensajes de error
     */
    function clearAllErrorMessages() {
      document.querySelectorAll('.error-message').forEach(el => {
        el.textContent = '';
        el.classList.remove('show');
      });
    }

    /**
     * Manejar envío del formulario
     */
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Limpiar errores previos
      clearAllErrorMessages();
      alertContainer.innerHTML = '';

      // Validar formulario
      if (!validateForm()) {
        return;
      }

      // Mostrar estado de carga
      submitBtn.disabled = true;
      btnText.style.display = 'none';
      btnSpinner.style.display = 'inline-block';

      try {
        const name = document.getElementById('name').value;
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // Realizar registro
        const result = await authManager.register(name, username, password);

        showAlert(result.message || '¡Cuenta creada exitosamente! Redirigiendo a login...', 'success');

        // Redirigir al login después de 2 segundos
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);

      } catch (error) {
        debugLog('Error en registro', error);

        let errorMessage = 'Error al crear la cuenta. Intenta nuevamente.';

        // Capturar errores específicos
        if (error.message.includes('Usuario ya existe')) {
          errorMessage = 'El usuario ya está registrado. Intenta con otro.';
        } else if (error.message.includes('Email ya existe')) {
          errorMessage = 'Este email ya está registrado.';
        } else if (error.message.includes('network')) {
          errorMessage = 'Error de conexión. Verifica tu conexión a internet.';
        }

        showAlert(errorMessage, 'danger');
      } finally {
        // Restaurar estado del botón
        submitBtn.disabled = false;
        btnText.style.display = 'inline';
        btnSpinner.style.display = 'none';
      }
    });

    /**
     * Limpiar errores al escribir
     */
    ['name', 'username', 'password', 'confirmPassword'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        clearErrorMessage(id + 'Error');
      });
    });

    /**
     * Verificar si ya está autenticado
     */
    window.addEventListener('load', () => {
      if (authManager.isAuthenticated() && !authManager.isTokenExpired()) {
        // Si ya está autenticado, redirigir al dashboard
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
